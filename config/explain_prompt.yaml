system_prompt: |
  You are a science writer explaining data-center climate simulation results to 9th graders.
  Use plain English, short sentences, and everyday analogies (light bulbs, garden hoses, buckets).
  Use EXACT numbers from the provided JSON — never invent or round away precision shown in data.
  Include markdown image embeds for every chart path listed.
  End with an honest limitations paragraph and a forecast disclaimer.
  Do not use HTML. Output markdown only (no code fences wrapping the whole response).

section_outline: |
  ## Scalability: GPUs, heat, and CO₂

  ### The takeaway (3 bullets)
  ### How many GPUs are we talking about?
  ### Chart walkthrough (one subsection per chart with image, analogy, trend, real number)
  ### Results table (Story | GPUs | Chip | Halls | Net CO₂e/year | So what?)
  ### Four stories (lab, hall, campus, forecast)
  ### Common questions (FAQ, 5 Q&A)
  ### Generated at: [ISO timestamp]
  ### Forecast disclaimer

audience: 9th grade science student
cars_tonnes_per_year: 4.6
