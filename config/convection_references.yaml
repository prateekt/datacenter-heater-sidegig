plain_english_gaps:
  - q: "Has anyone built chimney DAC at a GPU campus?"
    a: "Not in published literature. Zandian & Ashjaee (2013) use power-plant cooling towers; Hamblin et al. (2024) study DC liquid-loop DAC — neither is our exact design."
  - q: "Is 5.5 GJ per tonne of CO₂ realistic?"
    a: "Yes — Keith et al. (2018) report 5.25–8.81 GJ/t for solvent DAC; Sabatino et al. (2023) survey 0.5–18.75 GJ/t across sorbent types."
  - q: "Why is our capture only ~600 tonnes/year?"
    a: "Commercial papers size plants at **0.9–1 Mt/yr** (Keith 2018, McQueen 2020). We model one hall with lumped contactor area — throughput, not physics, is the limit."
