plain_english_gaps:
  - q: "Has anyone built chimney DAC at a GPU campus?"
    a: "Not in published literature. Zandian & Ashjaee (2013) use power-plant cooling towers; Hamblin et al. (2024) study DC liquid-loop DAC — neither is our exact design."
  - q: "Is 5.5 GJ per tonne of CO₂ realistic?"
    a: "Yes — Keith et al. (2018) report 5.25–8.81 GJ/t; Sabatino et al. (2023) survey 0.5–18.75 GJ/t across sorbent types."
  - q: "Why is our capture only ~600 tonnes/year?"
    a: "Commercial papers size plants at **0.9–1 Mt/yr** (Keith 2018). Nuclear studies target **0.3–15 Mt/yr** per reactor — we model one hall with lumped contactor area."
  - q: "Why don't we use nuclear if papers say it's cheaper?"
    a: "We deliberately use **grid-average electricity** and **existing GPU waste heat** — not new reactors. Nuclear DAC papers assume steady carbon-free power; they also downplay waste, accident, and proliferation concerns that many people find unacceptable."
  - q: "What do net-zero papers say about DAC?"
    a: "Minx & Fuss (2018) and Lee et al. (arXiv:2211.00791) treat DAC as one **negative-emission tool** in a portfolio — necessary at scale for 1.5 °C, but not sufficient alone."
