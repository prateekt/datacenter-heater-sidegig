# Representative NVIDIA data-center GPU thermal profiles.
# system_waste_w_per_gpu = heat delivered to secondary loop per GPU (TDP + rack/CDU overhead).
# Forecast rows use public GTC / analyst targets — not NVIDIA engineering data.

reference_hall:
  profile_id: B200_LC
  gpu_count: 25000
  avg_waste_heat_mw: 33.75
  # Sourced scale: xAI Colossus uses four ~25,000-GPU compute halls (100k H100 total).
  # ServeTheHome / Supermicro case study, 2024. See README "Hall size sources".

utilization:
  base_factor: 0.901    # q_waste_base / (gpus * W/GPU) at reference hall
  peak_factor: 1.442    # q_waste_peak / (gpus * W/GPU) at reference hall

hall_size_sources:
  - label: "xAI Colossus compute hall"
    gpus_per_hall: 25000
    citation: "ServeTheHome / Supermicro — four 25,000-GPU halls in 100k H100 Colossus cluster"
  - label: "B200 HGX rack density"
    gpus_per_mw: 200
    citation: "Introl B200 deployment guide — ~160–224 GPUs/MW (8-GPU racks, 35–50 kW/rack)"
  - label: "GB200 NVL72 rack"
    gpus_per_rack: 72
    rack_power_kw: 120
    citation: "SemiAnalysis / NVIDIA — NVL72 ~120 kW, 72 GPUs (~1.67 kW/GPU rack power)"

